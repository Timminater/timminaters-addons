name: Test

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  build:
    name: Test ${{ matrix.app }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - homeassistant-samsung-frametv-artchanger
          - llm_proxy
          - esphome_mcp
    uses: ./.github/workflows/build-app.yml
    with:
      app: ${{ matrix.app }}
      publish: false
    secrets: inherit
