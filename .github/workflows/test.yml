name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test ${{ matrix.app }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - homeassistant-samsung-frametv-artchanger
          - llm_proxy
          - esphome_mcp
          - speaker_recognition
    uses: ./.github/workflows/build-app.yml
    with:
      app: ${{ matrix.app }}
      publish: false
    secrets: inherit

  speaker-recognition-tests:
    name: Speaker Recognition unit and API tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: speaker_recognition/requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install -r speaker_recognition/requirements-test.txt

      - name: Run tests
        working-directory: speaker_recognition
        run: pytest -q

  speaker-recognition-model-smoke:
    name: Speaker Recognition offline model smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Build the offline model image
        run: docker build --tag speaker-recognition-model-smoke speaker_recognition

      - name: Run real inference under the 2 GB ceiling
        run: >-
          docker run --rm --network none --memory 2g --cpus 4
          --env PYTHONPATH=/app
          --volume "$PWD/speaker_recognition/tests:/tests:ro"
          --entrypoint python
          speaker-recognition-model-smoke
          /tests/model_pipeline_smoke.py
