name: Publish Speaker Recognition

on:
  pull_request:
    paths:
      - speaker_recognition/**
      - .github/workflows/publish-speaker-recognition.yml
      - .github/workflows/build-app.yml
  push:
    branches:
      - main
    paths:
      - speaker_recognition/**
      - .github/workflows/publish-speaker-recognition.yml
      - .github/workflows/build-app.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Speaker Recognition
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: speaker_recognition/requirements-test.txt

      - name: Run unit and API tests
        run: |
          python -m pip install -r speaker_recognition/requirements-test.txt
          cd speaker_recognition
          pytest -q

      - name: Build the offline model image
        run: docker build --tag speaker-recognition-release-check speaker_recognition

      - name: Run real inference under the 2 GB ceiling
        run: >-
          docker run --rm --network none --memory 2g --cpus 4
          --env PYTHONPATH=/app
          --volume "$PWD/speaker_recognition/tests:/tests:ro"
          --entrypoint python
          speaker-recognition-release-check
          /tests/model_pipeline_smoke.py

  publish:
    name: Publish Speaker Recognition
    needs: validate
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-app.yml
    with:
      app: speaker_recognition
      publish: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
