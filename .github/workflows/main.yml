name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish ${{ matrix.app }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - homeassistant-samsung-frametv-artchanger
          - llm_proxy
          - esphome_mcp
    uses: ./.github/workflows/build-app.yml
    with:
      app: ${{ matrix.app }}
      publish: true
    secrets: inherit
