name: "Publish"

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Validate DockerHub token
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing GitHub Actions secret DOCKERHUB_TOKEN."
            echo "::error::Go to Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: timminater
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish
        uses: home-assistant/builder@master
        with:
          args: |
            --amd64 \
            --aarch64 \
            --target /data/homeassistant-samsung-frametv-artchanger \
            --docker-hub timminater \
